version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: flashsale-postgres
    environment:
      POSTGRES_DB: flashsale
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: flashsale-redis
    ports:
      - "6379:6379"